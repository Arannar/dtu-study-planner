name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-and-containerize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/backend.csproj

      - name: Build backend
        run: dotnet build backend/backend.csproj --no-restore

      - name: Run backend tests
        run: dotnet run --project backend.Tests/backend.Tests.csproj

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check frontend
        working-directory: frontend
        run: npm run check

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend utilities
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t dtu-study-planner .
